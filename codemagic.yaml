workflows:
  deploy:
    name: Deploy
    max_build_duration: 30
    instance_type: mac_mini_m2
    inputs:
      version_name:
        description: Version name for this build
        type: string
        default: "2.0.0"
    environment:
      java: 21
      android_signing:
        - key_sleep_timer
      groups:
        - google_play
        - firebase_credentials
        - revenue_cat
        - admob
      vars:
        PACKAGE_NAME: "dr.achim.sleep_timer"
    cache:
      cache_paths:
        - ~/.gradle/caches
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build Android release
        script: |
          LATEST_GOOGLE_PLAY_BUILD_NUMBER=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME")
          if [ -z $LATEST_GOOGLE_PLAY_BUILD_NUMBER ]; then
              # fallback in case no build number was found from Google Play. Alternatively, you can `exit 1` to fail the build
              UPDATED_BUILD_NUMBER=$BUILD_NUMBER
          else
              UPDATED_BUILD_NUMBER=$(($LATEST_GOOGLE_PLAY_BUILD_NUMBER + 1))
          fi
          ./gradlew bundleRelease -PversionCode=$UPDATED_BUILD_NUMBER -PversionName=${{ inputs.version_name }}
    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - dr.achim.dev@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true